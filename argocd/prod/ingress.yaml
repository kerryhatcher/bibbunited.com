apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-no-cache
  namespace: civpulse-prod
spec:
  headers:
    customResponseHeaders:
      Cache-Control: "no-store"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: public-cache
  namespace: civpulse-prod
spec:
  headers:
    customResponseHeaders:
      Cache-Control: "public, s-maxage=60, stale-while-revalidate=300"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bibbunited
  namespace: civpulse-prod
spec:
  entryPoints:
    - web
  routes:
    # Admin routes -- no caching per D-17
    - match: Host(`www.bibbunited.com`) && PathPrefix(`/admin`)
      kind: Rule
      services:
        - name: bibbunited
          port: 3000
      middlewares:
        - name: admin-no-cache
          namespace: civpulse-prod
    # Public routes -- with caching per D-18
    - match: Host(`www.bibbunited.com`)
      kind: Rule
      services:
        - name: bibbunited
          port: 3000
      middlewares:
        - name: public-cache
          namespace: civpulse-prod
