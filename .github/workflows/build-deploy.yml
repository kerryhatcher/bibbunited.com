name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.planning/**'
      - '.claude/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: bibbunited_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations and build
        env:
          DATABASE_URI: postgresql://ci:ci@localhost:5432/bibbunited_ci
          PAYLOAD_SECRET: ci-build-secret
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          pnpm payload migrate:fresh
          pnpm build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Update image tag in manifests
        env:
          NEW_TAG: sha-${{ github.sha }}
          FULL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          sed -i "s|image: .*bibbunited.*|image: ${FULL_IMAGE}:${NEW_TAG}|" argocd/dev/deployment.yaml
          sed -i "s|image: .*bibbunited.*|image: ${FULL_IMAGE}:${NEW_TAG}|" argocd/prod/deployment.yaml

      - name: Commit manifest changes
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd/
          git diff --staged --quiet || git commit -m "deploy: update image to sha-${COMMIT_SHA} [skip ci]"
          git push
