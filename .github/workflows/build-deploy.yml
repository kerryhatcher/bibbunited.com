name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.planning/**'
      - '.claude/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Update image tag in manifests
        env:
          NEW_TAG: sha-${{ github.sha }}
          FULL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          sed -i "s|image: .*bibbunited.*|image: ${FULL_IMAGE}:${NEW_TAG}|" argocd/dev/deployment.yaml
          sed -i "s|image: .*bibbunited.*|image: ${FULL_IMAGE}:${NEW_TAG}|" argocd/prod/deployment.yaml

      - name: Commit manifest changes
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd/
          git diff --staged --quiet || git commit -m "deploy: update image to sha-${COMMIT_SHA} [skip ci]"
          git push
