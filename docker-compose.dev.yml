services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: bibbunited
      POSTGRES_PASSWORD: bibbunited_dev
      POSTGRES_DB: bibbunited
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bibbunited"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
